<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convertidor de Temperatura</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background-color: #f4f4f9; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        #resultado { margin-top: 20px; font-weight: bold; color: #333; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h3>Conversor C° a F°</h3>
    <form id="tempForm">
        <label for="celsius">Grados Celsius:</label>
        <input type="number" id="celsius" step="any" placeholder="Ej: 25" required>
        <button type="submit">Convertir</button>
    </form>
    <div id="resultado"></div>
</div>

<script>
    document.getElementById('tempForm').addEventListener('submit', function(event) {
        // Evitar que el formulario recargue la página
        event.preventDefault();

        // Leer el valor del input
        const celsius = parseFloat(document.getElementById('celsius').value);

        // Aplicar la fórmula: F = C * 9/5 + 32
        const fahrenheit = (celsius * 9 / 5) + 32;

        // Imprimir el resultado con el formato solicitado
        // Se usa .toFixed(1) para asegurar el decimal como en el ejemplo (77.0)
        document.getElementById('resultado').innerText = 
            `${celsius} Celsius = ${fahrenheit.toFixed(1)} Fahrenheit`;
    });
</script>

</body>
</html>
