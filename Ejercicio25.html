<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablas de Multiplicar</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            text-align: center;
            padding: 20px;
        }
        h1 { color: #2c3e50; }
        button {
            padding: 12px 24px;
            font-size: 1rem;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #2980b9; }
        
        #contenedor-tablas {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .tabla {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-top: 4px solid #3498db;
        }
        .tabla h3 {
            margin-top: 0;
            color: #e67e22;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }
        .linea-multiplicar {
            font-size: 0.9rem;
            margin: 5px 0;
            color: #555;
        }
    </style>
</head>
<body>

    <h1>Generador de Tablas de Multiplicar</h1>
    <p>Haz clic abajo para ver las tablas del 1 al 10:</p>
    
    <button onclick="generarTablas()">Generar Tablas</button>

    <div id="contenedor-tablas">
        </div>

    <script>
        function generarTablas() {
            const contenedor = document.getElementById('contenedor-tablas');
            // Limpiamos el contenedor por si ya había tablas
            contenedor.innerHTML = '';

            // Ciclo externo: Controla de qué número es la tabla (1 al 10)
            for (let i = 1; i <= 10; i++) {
                
                // Creamos un div para cada tabla
                let tablaDiv = document.createElement('div');
                tablaDiv.className = 'tabla';
                
                let contenido = `<h3>Tabla del ${i}</h3>`;

                // Ciclo interno: Realiza las multiplicaciones del 1 al 10
                for (let j = 1; j <= 10; j++) {
                    let resultado = i * j;
                    contenido += `<div class="linea-multiplicar">${i} x ${j} = <b>${resultado}</b></div>`;
                }

                tablaDiv.innerHTML = contenido;
                contenedor.appendChild(tablaDiv);
            }
        }
    </script>

</body>
</html>
