<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificador de Votación</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; padding-top: 50px; background-color: #f0f2f5; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); width: 350px; }
        h2 { color: #1c1e21; font-size: 1.3rem; margin-bottom: 20px; text-align: center; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #e67e22; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: bold; }
        button:hover { background-color: #d35400; }
        #resultado { margin-top: 20px; font-size: 1.1rem; text-align: center; color: #2c3e50; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <h2>Elegibilidad para Votar</h2>
    <form id="votoForm">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" placeholder="Ej: María" required>
        
        <label for="edad">Edad:</label>
        <input type="number" id="edad" placeholder="Ej: 25" min="0" required>
        
        <button type="submit">Verificar</button>
    </form>
    <div id="resultado"></div>
</div>

<script>
    document.getElementById('votoForm').addEventListener('submit', function(event) {
        // Evitar que el formulario recargue la página
        event.preventDefault();

        // Obtener valores
        const nombre = document.getElementById('nombre').value;
        const edad = parseInt(document.getElementById('edad').value);
        const resultadoDiv = document.getElementById('resultado');

        // Lógica de validación
        if (edad >= 18) {
            resultadoDiv.innerText = `${nombre} puede votar.`;
        } else {
            resultadoDiv.innerText = `${nombre} no puede votar.`;
        }
    });
</script>

</body>
</html>
