<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fórmula General</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .contenedor {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      width: 400px;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
      color: #333;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
    }

    button {
      margin-top: 15px;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #0078d7;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #005fa3;
    }
  </style>
</head>
<body>
  <div class="contenedor">
    <h1>Calculadora de Fórmula General</h1>

    <form onsubmit="return false;">
      <input type="number" id="a" placeholder="Ingresa el valor de a">
      <input type="number" id="b" placeholder="Ingresa el valor de b">
      <input type="number" id="c" placeholder="Ingresa el valor de c">
      <button onclick="calcularFormula()">Calcular x1 y x2</button>
    </form>
  </div>

  <script>
    function calcularFormula() {
      let a = parseFloat(document.getElementById("a").value);
      let b = parseFloat(document.getElementById("b").value);
      let c = parseFloat(document.getElementById("c").value);

      if (isNaN(a) || isNaN(b) || isNaN(c)) {
        alert("Por favor, captura los valores de a, b y c.");
        return;
      }

      if (a === 0) {
        alert("El valor de 'a' no puede ser 0.");
        return;
      }

      let discriminante = (b * b) - (4 * a * c);

      if (discriminante < 0) {
        alert("La ecuación no tiene soluciones reales.");
        return;
      }

      let x1 = (-b + Math.sqrt(discriminante)) / (2 * a);
      let x2 = (-b - Math.sqrt(discriminante)) / (2 * a);

      alert("El valor de x1 es: " + x1 + "\nEl valor de x2 es: " + x2);
    }
  </script>
</body>
</html>
