<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convertidor de Calificaciones</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; padding-top: 50px; background-color: #f4f7f6; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 2px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 12px; background-color: #3498db; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: bold; }
        button:hover { background-color: #2980b9; }
        #resultado { margin-top: 25px; font-size: 1.2rem; text-align: center; font-weight: bold; color: #e67e22; }
    </style>
</head>
<body>

<div class="container">
    <h2>Sistema de Calificaciones</h2>
    <form id="gradeForm">
        <label for="puntuacion">Puntuación (0-100):</label>
        <input type="number" id="puntuacion" min="0" max="100" placeholder="Ej: 85" required>
        <button type="submit">Obtener Letra</button>
    </form>
    <div id="resultado"></div>
</div>

<script>
    document.getElementById('gradeForm').addEventListener('submit', function(event) {
        event.preventDefault();

        const puntos = parseInt(document.getElementById('puntuacion').value);
        const display = document.getElementById('resultado');
        let letra = "";

        // Lógica utilizando if, else if, else
        if (puntos >= 90) {
            letra = "A";
        } else if (puntos >= 80) {
            letra = "B";
        } else if (puntos >= 70) {
            letra = "C";
        } else if (puntos >= 60) {
            letra = "D";
        } else {
            letra = "F";
        }

        display.innerText = `Calificación: ${letra}`;
    });
</script>

</body>
</html>
